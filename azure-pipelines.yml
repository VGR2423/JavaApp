
trigger:
- master
pool:
  name: SelfHostedPool
stages:
# =====================
# BUILD STAGE
# =====================
- stage: Build
  displayName: Build Stage
  jobs:
  - job: Build
    displayName: Build Job
    pool:
      name: SelfHostedPool
    steps:
      # Optional: verify Java & Maven (logging only)
      - script: |
          export JAVA_HOME="$(/usr/libexec/java_home -v 23)"
          export PATH="$JAVA_HOME/bin:$PATH"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          mvn -version
        displayName: Verify Java and Maven
      # Maven build (THIS is what matters)
      - task: Maven@3
        displayName: Maven Package
        inputs:
          mavenPomFile: 'pom.xml'
          goals: 'package'
          mavenOptions: '-Xmx3072m'
          javaHomeOption: 'Path'
          jdkUserInputPath: '/Users/venugopalreddycholleti/Library/Java/JavaVirtualMachines/openjdk-23.0.2/Contents/Home'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'

      - task: CopyFiles@2
        inputs:
          SourceFolder: '$(Build.SourcesDirectory)'
          Contents: '**/*.war'
          TargetFolder: '$(Build.ArtifactStagingDirectory)'
      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)'
          ArtifactName: 'warfile'
          publishLocation: 'Container'

# =====================
# DEPLOY (RELEASE) STAGE
# ====================
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: Deploy Job
    steps:
      - task: DownloadPipelineArtifact@2
        inputs:
          artifact: 'warfile'
          path: '$(Pipeline.Workspace)/war/webapp/target/'
      - script: |
          echo "Removing old deployment..."
          rm -rf opt/tomcat/apache-tomcat-10.1.54/webapps/webapp
          rm -f  /opt/tomcat/apache-tomcat-10.1.54/webapps/webapp.war

          echo "Deploying new WAR..."
          cp $(Pipeline.Workspace)/war/*.war /opt/tomcat/apache-tomcat-10.1.54/webapps/
          echo "Deployment completed."
        displayName: Deploy WAR to Tomcat

